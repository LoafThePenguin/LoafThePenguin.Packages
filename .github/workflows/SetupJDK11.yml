name: Setup JDK 11
on:
    workflow_call:
jobs:
    Setup-JDK11:
        name: Set up JDK 11
        runs-on: windows-latest
        steps:
          - name: Set up JDK 11
            uses: actions/setup-java@v1
            with:
                java-version: 1.11
      
          - name: Cache JDK 11
            uses: actions/cache@v1
            with:
                path: ~\jdk11\cache
                key: ${{ runner.os }}-jdk11
                restore-keys: ${{ runner.os }}-jdk11
